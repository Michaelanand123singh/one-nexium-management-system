version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm install
      - npx prisma generate
      - export NODE_OPTIONS="--max-old-space-size=2560" && npx next build --no-lint
run:
  command: node .next/standalone/server.js
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: 3000
    - name: HOSTNAME
      value: "0.0.0.0"
