name: Deploy Production

on:
  workflow_dispatch:
  # Auto-deploy after GitHub secrets/variables are configured (see docs/CI-CD.md).
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to VM
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          GCP_INSTANCE: ${{ vars.GCP_INSTANCE }}
          APP_URL: ${{ vars.APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          chmod +x scripts/deploy-gcp-vm.sh
          bash scripts/deploy-gcp-vm.sh
